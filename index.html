<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MP">
    <meta name="theme-color" content="#009EE3">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./mercado.jfif">
    <title>Mercado Pago</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Partículas de fundo -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <header>
            <h1>Mercado Pago</h1>
            <p>Suas transferências</p>
        </header>

        <div class="notification-area" id="notificationArea">
            <p class="empty-state">Nenhuma notificação ainda</p>
        </div>

        <div class="notification-controls">
            <button id="enableNotifications" class="btn-primary">🔔 Ativar Notificações</button>
            <button id="installApp" class="btn-secondary" style="display:none;">📱 Instalar App</button>
        </div>

        <div class="form-section">
            <h2>🎯 Modo Manual</h2>
            <p class="section-description">Configure e inicie manualmente</p>
            <form id="comprovanteForm">
                <label>
                    Valor de cada notificação (R$):
                    <input type="number" id="valorManual" placeholder="Valor (R$)" step="0.01" value="19.90" min="0.01" required>
                </label>
                <label>
                    Quantas notificações:
                    <input type="number" id="quantidadeManual" value="1" min="1" max="1000" required>
                </label>
                <label>
                    Intervalo entre notificações (segundos):
                    <input type="number" id="intervaloManual" value="5" min="1" max="60" required>
                </label>
                <label>
                    Durante quanto tempo (minutos):
                    <input type="number" id="duracaoManual" value="5" min="1" max="120" required>
                </label>
                <div class="button-group">
                    <button type="submit" class="btn-manual">▶️ Iniciar Manual</button>
                    <button type="button" id="stopManual" class="btn-danger" style="display:none;">⏹️ Parar</button>
                </div>
                <div id="statusManual" class="status-box" style="display:none;"></div>
            </form>
        </div>

        <div class="auto-notification-section">
            <h2>⚡ Modo Automático</h2>
            <p class="section-description">Notificações contínuas e automáticas</p>
            <div class="controls">
                <label>
                    Valor de cada notificação (R$):
                    <input type="number" id="valorAuto" placeholder="Valor (R$)" step="0.01" value="19.90" min="0.01">
                </label>
                <label>
                    Quantas notificações:
                    <input type="number" id="quantidadeNotif" value="10" min="1" max="1000">
                </label>
                <label>
                    Intervalo entre notificações (segundos):
                    <input type="number" id="intervaloSegundos" value="5" min="1" max="60">
                </label>
                <label>
                    Durante quanto tempo (minutos):
                    <input type="number" id="duracaoMinutos" value="5" min="1" max="120">
                </label>
                <div class="button-group">
                    <button id="startAuto" class="btn-success">▶️ Iniciar Automático</button>
                    <button id="stopAuto" class="btn-danger" style="display:none;">⏹️ Parar</button>
                </div>
                <div id="statusNotif" class="status-box" style="display:none;"></div>
            </div>
        </div>

        <div class="comprovantes-list">
            <h2>Histórico de Notificações</h2>
            <div id="comprovantesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
