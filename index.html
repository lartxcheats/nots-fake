<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mercado Pago">
    <meta name="theme-color" content="#009EE3">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./notification-icon.svg">
    <title>Mercado Pago</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mercado Pago</h1>
            <p>Suas transferências</p>
        </header>

        <div class="notification-area" id="notificationArea">
            <p class="empty-state">Nenhuma notificação ainda</p>
        </div>

        <div class="notification-controls">
            <button id="enableNotifications" class="btn-primary">🔔 Ativar Notificações</button>
            <button id="installApp" class="btn-secondary" style="display:none;">📱 Instalar App</button>
        </div>

        <div class="form-section">
            <h2>Criar Notificação Manual</h2>
            <form id="comprovanteForm">
                <select id="tipoTransferencia" required>
                    <option value="">Tipo de transferência</option>
                    <option value="Você recebeu R$ 19,90|O valor que|te transferiu via Pix já está rendendo.">Pix recebido</option>
                </select>
                <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
                <input type="text" id="destinatario" placeholder="Nome do remetente" required>
                <button type="submit">Enviar Notificação</button>
            </form>
        </div>

        <div class="auto-notification-section">
            <h2>Modo Automático</h2>
            <p>Receba notificações de transferências automaticamente</p>
            <div class="controls">
                <label>
                    Quantas notificações:
                    <input type="number" id="quantidadeNotif" value="10" min="1" max="100">
                </label>
                <label>
                    Durante quanto tempo (segundos):
                    <input type="number" id="duracaoMinutos" value="30" min="5" max="300">
                </label>
                <div style="display: flex; gap: 8px; width: 100%;">
                    <button id="startAuto" class="btn-success">▶️ Iniciar Notificações</button>
                    <button id="stopAuto" class="btn-danger" style="display:none;">⏹️ Parar</button>
                </div>
                <div id="statusNotif" style="display:none; padding: 12px; background: rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 13px; text-align: center;"></div>
            </div>
        </div>

        <div class="comprovantes-list">
            <h2>Histórico de Notificações</h2>
            <div id="comprovantesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
