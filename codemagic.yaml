workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Fix asset catalog
        script: |
          printf '{\n  "images" : [\n    {\n      "filename" : "AppIcon-1024.png",\n      "idiom" : "universal",\n      "platform" : "ios",\n      "size" : "1024x1024"\n    }\n  ],\n  "info" : {\n    "author" : "xcode",\n    "version" : 1\n  }\n}' > ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT=YES \
            VALIDATE_WORKSPACE=NO \
            ASSETCATALOG_COMPILER_WARNINGS=NO \
            ASSETCATALOG_COMPILER_OPTIMIZATION=time
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/MercadoPago.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
