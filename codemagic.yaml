workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            || true
          cd build/App.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r ../../../../build/ipa/App.ipa Payload/
    artifacts:
      - build/ipa/*.ipa
