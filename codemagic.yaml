workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Fix app icon
        script: |
          cd ios/App/App/Assets.xcassets/AppIcon.appiconset
          # Cria um PNG válido 1024x1024 usando Python
          python3 -c "
          import struct, zlib

          def create_png(width, height, color):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              
              raw = b''
              for y in range(height):
                  raw += b'\\x00'
                  for x in range(width):
                      raw += bytes(color)
              
              compressed = zlib.compress(raw)
              
              png = b'\\x89PNG\\r\\n\\x1a\\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', compressed)
              png += chunk(b'IEND', b'')
              return png
              
          with open('AppIcon-512@2x.png', 'wb') as f:
              f.write(create_png(1024, 1024, [0, 158, 227]))
          "
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/MercadoPago.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
