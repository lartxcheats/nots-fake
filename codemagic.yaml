workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prepare App Icon
        script: |
          pip3 install Pillow
          python3 - <<'EOF'
          from PIL import Image
          import os
          
          # Caminho do ícone
          input_icon = 'mercado.jfif'
          output_icon = 'ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png'
          
          # Abrir e converter
          img = Image.open(input_icon)
          img = img.convert('RGB')
          img = img.resize((1024, 1024), Image.Resampling.LANCZOS)
          img.save(output_icon, 'PNG')
          print(f"Icon created: {output_icon}")
          EOF
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/MercadoPago.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
