workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Prepare App Icon
        script: |
          pip3 install Pillow
          python3 <<'EOF'
          from PIL import Image
          import os
          
          input_icon = 'pagamentos3.png'
          output_icon = 'ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png'
          
          print(f"Opening {input_icon}...")
          img = Image.open(input_icon)
          
          # Converter para RGB (remove alpha channel se tiver)
          if img.mode in ('RGBA', 'LA', 'P'):
              background = Image.new('RGB', img.size, (255, 255, 255))
              if img.mode == 'P':
                  img = img.convert('RGBA')
              background.paste(img, mask=img.split()[-1] if img.mode == 'RGBA' else None)
              img = background
          elif img.mode != 'RGB':
              img = img.convert('RGB')
          
          # Redimensionar para 1024x1024
          print("Resizing to 1024x1024...")
          img = img.resize((1024, 1024), Image.Resampling.LANCZOS)
          
          # Salvar como PNG
          print(f"Saving to {output_icon}...")
          img.save(output_icon, 'PNG', optimize=False)
          
          # Verificar arquivo criado
          if os.path.exists(output_icon):
              size = os.path.getsize(output_icon)
              print(f"✓ Icon created successfully: {size} bytes")
          else:
              print("✗ Failed to create icon")
              exit(1)
          EOF
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Build iOS unsigned
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA unsigned
        script: |
          mkdir -p $CM_BUILD_DIR/ipa
          cd $CM_BUILD_DIR/App.xcarchive/Products/Applications
          mkdir Payload
          cp -r App.app Payload/
          zip -r $CM_BUILD_DIR/ipa/MercadoPago.ipa Payload/
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
